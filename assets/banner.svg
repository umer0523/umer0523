<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Umer Khalid — Senior Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c1c"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="62%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#7c5cff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
    <clipPath id="nameClip">
      <text x="600" y="182" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="84">Umer Khalid</text>
    </clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <g>
    <circle cx="150" cy="70" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="92" r="3" fill="#7c5cff"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="225" cy="232" r="2.5" fill="#7c5cff"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="985" cy="222" r="3.5" fill="#22d3ee"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <text x="600" y="92" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" letter-spacing="7" fill="#22d3ee">SENIOR SOFTWARE ENGINEER</text>

  <g clip-path="url(#nameClip)">
    <rect x="0" y="100" width="1200" height="112" fill="url(#grad)"/>
    <rect x="-300" y="100" width="220" height="112" fill="#ffffff" opacity="0.45">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="1500 0" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="600" y="224" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" fill="#9aa0c7">Backend &#183; Frontend &#183; DevOps &#183; AI</text>

  <rect y="248" height="3" rx="1.5" fill="url(#grad)">
    <animate attributeName="x" values="600;450;600" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="width" values="0;300;0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <text x="600" y="284" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#868cb4">// software that holds up in production</text>
</svg>
